[general]
live_config_reload = true

[window]
opacity = 0.86
padding = { x = 5, y = 3 }
dynamic_padding = true
decorations = "None"
startup_mode = "Maximized"
blur = true

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "Jetbrains Mono", style = "Regular" }
bold = { family = "Jetbrains Mono", style = "Regular" }
italic = { family = "Jetbrains Mono", style = "Regular" }
bold_italic = { family = "Jetbrains Mono", style = "Regular" }
size = 16

[colors.primary]
foreground = "#fcfcfc"
background = "#212020"

[bell]
animation = "EaseOut"

[cursor]
style = { shape = "Beam", blinking = "Always" }
blink_interval = 1000

[keyboard]
bindings = [
{ key = "T", mods = "Super|Shift", action = "CreateNewWindow" },
{ key = "R", mods = "Super|Shift", action = "SpawnNewInstance" },
{ key = "F", mods = "Super|Shift", action = "ToggleFullscreen" },
{ key = "G", mods = "Super|Shift", action = "Quit" },
]
